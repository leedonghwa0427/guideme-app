<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>profile</title>

    <link rel="stylesheet" href="css/prfile.css" />
    <script src="js/script.js"></script>
  </head>
  <body>
    <div class="wrap">
      <!-- 상단 헤더 -->
      <div class="header">
        <h1 class="logo">Guide Me</h1>
        <img src="assets/icons/rabbit.png" alt="로고" />
      </div>

      <!-- 프로필  -->
      <div class="profile">
        <div class="logout">
          <button class="log-btn">
            Logout
            <img src="assets/icons/go.png" alt="로그아웃" />
          </button>
        </div>

        <div class="imgbox">
          <img src="assets/images/profileimage.png" alt="프로필 사진" />
          <button class="edit">
            <img src="assets/icons/edit.png" alt="프로필 편집" />
          </button>
        </div>

        <div class="name">tokki 님</div>
        <div class="email">tokki01@naver.com</div>
      </div>

      <!-- 구분 배너 -->
      <div class="banner"></div>

      <!-- 설정  -->
      <div class="settings">
        <h2 class="title">설정메뉴</h2>
        <p class="sub">편리한 사용을 위한 맞춤 설정</p>

        <ul class="list">
          <li class="item">알림 설정</li>
          <li class="item">접근성 설정</li>
          <li class="item">진동 설정</li>
          <li class="item">글자 크기 조절</li>
        </ul>
      </div>

      <!-- 하단 네비게이션 -->
      <nav class="nav">
        <button class="nav-item">
          <img src="assets/icons/home.png" alt="홈" />
          <span>홈</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/heart.png" alt="추천" />
          <span>추천</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/fillcalender.png" alt="캘린더" />
          <span>캘린더</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/profill.png" alt="프로필" />
          <span>프로필</span>
        </button>
      </nav>
    </div>
  </body>
</html>
